services:
  db:
    image: postgres:16-alpine
    container_name: max_bot_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  init-db:
    image: postgres:16-alpine
    container_name: max_bot_db_init
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      USER_PASSWORD: ${USER_PASSWORD}
    volumes:
      - ./database/init.sh:/init.sh
      - ./database/01-init-db.sql:/init.sql
    command: sh -c "chmod +x /init.sh && /init.sh"
    restart: "no"

  migrations:
    build: .
    container_name: max_bot_db_migrations
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: postgresql+psycopg2://max_bot_admin:${ADMIN_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    command: alembic upgrade head
    restart: "no"

  bot:
    build: .
    container_name: max_bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://max_bot_user:${USER_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
