services:
  db:
    image: postgres:16-alpine
    container_name: max_bot_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  init-db:
    image: postgres:16-alpine
    container_name: max_bot_db_init
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      USER_PASSWORD: ${USER_PASSWORD}
    volumes:
      - ./database/init.sh:/init.sh
    command: sh -c "chmod +x /init.sh && bash /init.sh"
    restart: "no"
    healthcheck:
      test: [ "CMD-SHELL", "psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1 FROM pg_roles WHERE rolname=''max_bot_admin''' | grep -q 1" ]
      interval: 2s
      timeout: 5s
      retries: 30

  migrations:
    build: .
    container_name: max_bot_db_migrations
    depends_on:
      init-db:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg2://max_bot_admin:${ADMIN_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./database/migrations:/app/database/migrations
    command: alembic upgrade head
    restart: "no"

  bot:
    build: .
    container_name: max_bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://max_bot_user:${USER_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data: